<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="container">

    <div class="card">

      <div class="card-header">
        <div class="icon-ring">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="3"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div>
          <h1 class="card-title">Age Calculator</h1>
          <p class="card-subtitle">Discover your exact age down to the day</p>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Date of Birth</label>
        <div class="input-row">
          <div class="input-wrap">
            <input type="number" id="inp-day" placeholder="DD" min="1" max="31" />
            <span class="input-tag">Day</span>
          </div>
          <div class="input-wrap">
            <input type="number" id="inp-month" placeholder="MM" min="1" max="12" />
            <span class="input-tag">Month</span>
          </div>
          <div class="input-wrap">
            <input type="number" id="inp-year" placeholder="YYYY" min="1900" max="2099" />
            <span class="input-tag">Year</span>
          </div>
        </div>
        <p class="error-msg" id="error-msg">Please enter a valid date of birth.</p>
      </div>

      <button class="calc-btn" id="calc-btn">
        Calculate My Age
        <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>

      <div class="result-area" id="result-area">
        <div class="result-divider">
          <span>Your Age</span>
        </div>
        <div class="result-grid">
          <div class="result-box">
            <span class="result-val" id="res-years">0</span>
            <span class="result-unit">Years</span>
          </div>
          <div class="result-box">
            <span class="result-val" id="res-months">0</span>
            <span class="result-unit">Months</span>
          </div>
          <div class="result-box">
            <span class="result-val" id="res-days">0</span>
            <span class="result-unit">Days</span>
          </div>
        </div>

        <!-- <div class="birthday-card" id="birthday-card">
          <div class="bday-icon">🎂</div>
          <div class="bday-text">
            <span class="bday-label">Next Birthday</span>
            <span class="bday-val" id="bday-text">—</span>
          </div>
        </div> -->
      </div>

    </div>

  </main>

  <!-- Write your JavaScript here -->
  <script src="app.js"></script>

</body>
</html>
